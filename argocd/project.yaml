apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: gitops-project
  namespace: argocd
spec:
  description: "ops-platform 프로젝트 (ops-app1 + ops-app2)"

  sourceRepos:
    - "https://github.com/jangmh1017/gitops-config"

  destinations:
    - server: "https://kubernetes.default.svc"
      namespace: "ops-app1-*"
    - server: "https://kubernetes.default.svc"
      namespace: "ops-app2-*"

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
