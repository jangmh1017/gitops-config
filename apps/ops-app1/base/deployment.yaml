apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ops-app1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ops-app1
    spec:
      containers:
        - name: app
          image: ops-app1
          ports:
            - name: http
              containerPort: 8081
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          envFrom:
            - configMapRef:
                name: ops-app1-config
            - secretRef:
                name: ops-app1-secrets
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5