apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - external-secret.yaml
  - gateway-route.yaml
namespace: ops-app1-eks-dev
images:
  - name: ops-app1
    newName: 500923064723.dkr.ecr.ap-northeast-2.amazonaws.com/ops-app1
    newTag: "sha-placeholder"
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: ops-app1
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
    target:
      kind: Deployment
      name: ops-app1
configMapGenerator:
  - name: ops-app1-config
    behavior: merge
    literals:
      - PROFILE=eks-dev
      - OPS_APP2_URL=http://ops-app2.ops-app2-eks-dev.svc.cluster.local:8082